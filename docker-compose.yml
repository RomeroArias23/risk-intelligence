services:
  postgres:
    image: postgres:16
    container_name: esg-postgres
    environment:
      POSTGRES_USER: esg_user
      POSTGRES_PASSWORD: esg_dev_password
      POSTGRES_DB: esg_risk_intelligence
    ports:
      - "5432:5432"
    volumes:
      - esg_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esg_user -d esg_risk_intelligence"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: esg-ai-service:dev
    container_name: esg-ai-service
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  esg_pg_data:
