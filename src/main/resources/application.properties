# ============================================================================
# Base configuration — common to all environments.
# Environment-specific overrides live in application-{profile}.properties.
# ============================================================================

spring.application.name=risk-intelligence

# ----- Datasource (values come from env vars or local profile) -----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/esg_risk_intelligence}
spring.datasource.username=${DB_USERNAME:esg_user}
spring.datasource.password=${DB_PASSWORD:esg_dev_password}

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ----- AI service client -----
ai-service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8000}
ai-service.connect-timeout-ms=${AI_SERVICE_CONNECT_TIMEOUT_MS:2000}
ai-service.read-timeout-ms=${AI_SERVICE_READ_TIMEOUT_MS:10000}

# ----- Default active profile -----
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}